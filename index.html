<!DOCTYPE html>
<html lang="ko" data-theme="glacier">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BlackCatBook Docs</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
</head>
<body>

<!-- ======= THEME SWITCHER PANEL ======= -->
<div class="theme-panel" id="themePanel">
  <button class="theme-panel-toggle" id="themePanelToggle" aria-label="테마 변경">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="3"/><path d="M19.07 4.93l-1.41 1.41M5.34 18.66l-1.41 1.41M2 12H4M20 12h2M19.07 19.07l-1.41-1.41M5.34 5.34L3.93 3.93M12 2v2M12 20v2"/>
    </svg>
  </button>
  <div class="theme-options" id="themeOptions">
    <p class="theme-label">테마 선택</p>
    <button class="theme-btn active" data-theme="glacier" title="Glacier">
      <span class="swatch" style="background: linear-gradient(135deg,#fff 50%,#3b82f6 50%)"></span>
      <span>Glacier</span>
    </button>
    <button class="theme-btn" data-theme="midnight" title="Midnight">
      <span class="swatch" style="background: linear-gradient(135deg,#1e293b 50%,#818cf8 50%)"></span>
      <span>Midnight</span>
    </button>
    <button class="theme-btn" data-theme="forest" title="Forest">
      <span class="swatch" style="background: linear-gradient(135deg,#f0fdf4 50%,#16a34a 50%)"></span>
      <span>Forest</span>
    </button>
    <button class="theme-btn" data-theme="sakura" title="Sakura">
      <span class="swatch" style="background: linear-gradient(135deg,#fff7f7 50%,#f43f5e 50%)"></span>
      <span>Sakura</span>
    </button>
    <button class="theme-btn" data-theme="slate" title="Slate">
      <span class="swatch" style="background: linear-gradient(135deg,#f8fafc 50%,#475569 50%)"></span>
      <span>Slate</span>
    </button>
  </div>
</div>

<!-- ======= HEADER ======= -->
<header class="site-header">
  <div class="header-inner">
    <div class="header-left">
      <button class="menu-toggle" id="menuToggle" aria-label="메뉴 열기">
        <span></span><span></span><span></span>
      </button>
      <a href="#" class="site-logo" data-page="home">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
          <rect width="28" height="28" rx="8" fill="var(--accent)"/>
          <text x="14" y="20" text-anchor="middle" font-size="16" fill="white">🐱</text>
        </svg>
        <span class="site-name">BlackCatBook</span>
        <span class="site-version">v2.0</span>
      </a>
    </div>
    <div class="header-center">
      <div class="search-box">
        <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input type="text" id="searchInput" placeholder="문서 검색..." autocomplete="off" />
        <kbd>⌘K</kbd>
      </div>
    </div>
    <div class="header-right">
      <a href="https://github.com" class="header-link" target="_blank" rel="noopener">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/>
        </svg>
      </a>
    </div>
  </div>
</header>

<!-- ======= SEARCH RESULTS OVERLAY ======= -->
<div class="search-overlay" id="searchOverlay">
  <div class="search-results" id="searchResults"></div>
</div>

<!-- ======= SIDEBAR OVERLAY (mobile) ======= -->
<div class="sidebar-overlay" id="sidebarOverlay"></div>

            홈

          <li><a href="#" class="nav-link" data-page="introduction">

            </ul>
          </li>
          <li><a href="#" class="nav-link" data-page="configuration">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93l-1.41 1.41M5.34 18.66l-1.41 1.41M2 12H4M20 12h2M19.07 19.07l-1.41-1.41M5.34 5.34L3.93 3.93M12 2v2M12 20v2"/></svg>
            설정
          </a></li>
          <li><a href="#" class="nav-link" data-page="integrations">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
            통합
          </a></li>
        </ul>
      </div>

      <div class="nav-group">
        <div class="nav-group-label">API 레퍼런스</div>
        <ul>
          <li><a href="#" class="nav-link" data-page="api-overview">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
            API 개요
          </a></li>
          <li><a href="#" class="nav-link" data-page="authentication">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>

          <li><a href="#" class="nav-link" data-page="webhooks">

      </div>

      <div class="nav-group">
        <div class="nav-group-label">리소스</div>
        <ul>
          <li><a href="#" class="nav-link" data-page="changelog">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            변경 로그
          </a></li>
          <li><a href="#" class="nav-link" data-page="faq">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>

        </ul>
      </div>

    </nav>
  </aside>

  <!-- CONTENT AREA -->
  <main class="content-area" id="contentArea">
    <div class="content-inner" id="contentInner">
      <!-- Dynamic content rendered here -->
    </div>

    <!-- PAGE NAVIGATION -->
    <nav class="page-nav" id="pageNav">
      <a href="#" class="page-nav-btn prev" id="prevBtn" style="display:none">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
        <span>
          <small>이전</small>
          <strong id="prevTitle"></strong>
        </span>
      </a>
      <a href="#" class="page-nav-btn next" id="nextBtn" style="display:none">
        <span>
          <small>다음</small>
          <strong id="nextTitle"></strong>
        </span>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
      </a>
    </nav>
  </main>

  <!-- TABLE OF CONTENTS (right sidebar) -->
  <aside class="toc-sidebar" id="tocSidebar">
    <div class="toc-inner">
      <p class="toc-title">이 페이지에서</p>
      <ul class="toc-list" id="tocList"></ul>
    </div>
  </aside>

</div>

<footer class="site-footer">

</footer>

<script src="app.js"></script>
</body>
</html>
